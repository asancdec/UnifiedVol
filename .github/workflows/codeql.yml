name: CodeQL

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
  schedule:
    - cron: "24 3 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze C++
    runs-on: ubuntu-24.04
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build g++-13 git curl zip unzip tar pkg-config

      - name: Install vcpkg
        run: |
          mkdir -p "$HOME/dev"
          git clone https://github.com/microsoft/vcpkg.git "$HOME/dev/vcpkg"
          "$HOME/dev/vcpkg/bootstrap-vcpkg.sh"

      - name: Cache vcpkg binary packages
        uses: actions/cache@v5
        with:
          path: .vcpkg-cache
          key: vcpkg-${{ runner.os }}-gcc13-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakePresets.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-gcc13-

      - name: Prepare vcpkg binary cache
        run: mkdir -p .vcpkg-cache

      - name: Validate CMake presets
        run: |
          cmake --list-presets
          cmake --build --list-presets
          ctest --list-presets

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-and-quality

      - name: Configure release build
        run: cmake --preset linux-gcc-release -DUNIFIEDVOL_ENABLE_CCACHE=OFF

      - name: Build correctness tests
        run: cmake --build --preset linux-gcc-release-tests

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          upload: never
          output: codeql-results

      - name: Filter third-party CodeQL results
        run: |
          python3 - <<'PY'
          import fnmatch
          import json
          import posixpath
          import pathlib
          import urllib.parse

          input_dir = pathlib.Path("codeql-results")
          output_dir = pathlib.Path("codeql-results-filtered")
          output_dir.mkdir(exist_ok=True)

          sarif_files = sorted(input_dir.rglob("*.sarif"))
          if not sarif_files:
              raise SystemExit("No SARIF files found in codeql-results")

          exclude_patterns = (
              "build/**",
              "**/vcpkg_installed/**",
              "external/**",
              "**/Eigen/**",
              "**/nlopt/**",
          )
          first_party_patterns = (
              "uv/**",
              "src/**",
              "include/**",
              "tests/**",
              "examples/**",
          )
          excluded_rule_ids = {
              "cpp/poorly-documented-function",
          }
          excluded_rule_names = {
              "Poorly documented large function",
          }
          high_problem_severities = {"error"}

          def result_line(result):
              locations = result.get("locations") or []
              if not locations:
                  return None
              region = locations[0].get("physicalLocation", {}).get("region", {})
              return region.get("startLine")

          def normalize_uri(uri, base_uri=""):
              uri = f"{base_uri}{uri}" if base_uri else uri
              parsed = urllib.parse.urlparse(uri)
              path = urllib.parse.unquote(parsed.path if parsed.scheme == "file" else uri)
              path = path.lstrip("/")
              marker = "UnifiedVol/"
              if marker in path:
                  path = path.split(marker, 1)[1]
              return posixpath.normpath(path.replace("\\", "/")).lstrip("./")

          def base_uri(run, uri_base_id):
              if not uri_base_id:
                  return ""
              base = run.get("originalUriBaseIds", {}).get(uri_base_id, {})
              return base.get("uri", "")

          def result_path(run, result):
              locations = result.get("locations") or []
              if not locations:
                  return ""
              artifact = locations[0].get("physicalLocation", {}).get("artifactLocation", {})
              return normalize_uri(artifact.get("uri", ""), base_uri(run, artifact.get("uriBaseId", "")))

          def matches(path, patterns):
              return any(fnmatch.fnmatch(path, pattern) for pattern in patterns)

          def rule_properties(run, result):
              rule_id = result.get("ruleId")
              for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                  if rule.get("id") == rule_id:
                      return rule.get("properties", {})
              return {}

          def rule_name(run, result):
              rule_id = result.get("ruleId")
              for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                  if rule.get("id") == rule_id:
                      short_description = rule.get("shortDescription", {}).get("text")
                      return short_description or rule.get("name") or ""
              return result.get("message", {}).get("text", "")

          def source_line(path, line_number):
              if not path or not line_number:
                  return ""
              try:
                  lines = pathlib.Path(path).read_text(encoding="utf-8").splitlines()
              except OSError:
                  return ""
              index = line_number - 1
              if index < 0 or index >= len(lines):
                  return ""
              return lines[index]

          def has_source_suppression(path, line_number, rule_id):
              if line_number is None:
                  return False
              token = f"codeql-suppress[{rule_id}]"
              return (
                  token in source_line(path, line_number)
                  or token in source_line(path, line_number - 1)
              )

          def is_excluded_rule(run, result):
              return (
                  result.get("ruleId") in excluded_rule_ids
                  or rule_name(run, result) in excluded_rule_names
              )

          def is_high_severity(run, result):
              properties = rule_properties(run, result)
              security_severity = properties.get("security-severity")
              if security_severity is not None:
                  try:
                      return float(security_severity) >= 7.0
                  except (TypeError, ValueError):
                      pass
              return (
                  properties.get("problem.severity") in high_problem_severities
                  or result.get("level") == "error"
              )

          total_before = 0
          total_after = 0
          first_party_after = 0
          high_first_party_after = 0
          excluded_rule_count = 0
          source_suppressed_count = 0

          for sarif_file in sarif_files:
              with sarif_file.open(encoding="utf-8") as fh:
                  sarif = json.load(fh)

              for run in sarif.get("runs", []):
                  results = run.get("results", [])
                  total_before += len(results)
                  filtered = []

                  for result in results:
                      if is_excluded_rule(run, result):
                          excluded_rule_count += 1
                          continue

                      path = result_path(run, result)
                      if not path or matches(path, exclude_patterns):
                          continue
                      if not matches(path, first_party_patterns):
                          continue
                      if has_source_suppression(path, result_line(result), result.get("ruleId", "")):
                          source_suppressed_count += 1
                          continue

                      filtered.append(result)
                      total_after += 1
                      first_party_after += 1
                      if is_high_severity(run, result):
                          high_first_party_after += 1

                  run["results"] = filtered

              with (output_dir / sarif_file.name).open("w", encoding="utf-8") as fh:
                  json.dump(sarif, fh)

          summary = pathlib.Path("codeql-filter-summary.md")
          summary.write_text(
              "\n".join(
                  [
                      "### CodeQL SARIF filter",
                      f"- Results before filtering: {total_before}",
                      f"- Results uploaded after filtering: {total_after}",
                      f"- Results in first-party paths: {first_party_after}",
                      f"- High-severity first-party results: {high_first_party_after}",
                      f"- Poorly documented large function results excluded: {excluded_rule_count}",
                      f"- Source-suppressed first-party results: {source_suppressed_count}",
                  ]
              )
              + "\n",
              encoding="utf-8",
          )
          with pathlib.Path(__import__("os").environ["GITHUB_STEP_SUMMARY"]).open(
              "a", encoding="utf-8"
          ) as fh:
              fh.write(summary.read_text(encoding="utf-8"))
          PY

      - name: Upload filtered CodeQL results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: codeql-results-filtered

      - name: Upload CodeQL SARIF artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: codeql-sarif
          path: |
            codeql-results
            codeql-results-filtered
            codeql-filter-summary.md
          retention-days: 14
          if-no-files-found: warn
