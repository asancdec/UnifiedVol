name: CodeQL

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
  schedule:
    - cron: "24 3 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze C++
    runs-on: ubuntu-24.04
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build g++-13 git curl zip unzip tar pkg-config

      - name: Install vcpkg
        run: |
          mkdir -p "$HOME/dev"
          git clone https://github.com/microsoft/vcpkg.git "$HOME/dev/vcpkg"
          "$HOME/dev/vcpkg/bootstrap-vcpkg.sh"

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: .vcpkg-cache
          key: vcpkg-${{ runner.os }}-gcc13-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-gcc13-

      - name: Prepare vcpkg binary cache
        run: mkdir -p .vcpkg-cache

      - name: Validate CMake presets
        run: |
          cmake --list-presets
          cmake --build --list-presets
          ctest --list-presets

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-and-quality

      - name: Configure release build
        run: cmake --preset linux-gcc-release

      - name: Build correctness tests
        run: cmake --build --preset linux-gcc-release-tests

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
