name: C++ CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  correctness:
    name: GCC Release non-performance tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build g++

      - name: Configure
        run: cmake --preset linux-gcc-release-tests

      - name: Build
        run: cmake --build --preset linux-gcc-release-tests

      - name: Run non-performance tests
        run: ctest --preset linux-gcc-release-nonperformance --output-on-failure

  performance:
    name: GCC performance guardrails
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build g++

      - name: Configure performance build
        run: cmake --preset linux-gcc-perf

      - name: Build performance tests
        run: cmake --build --preset linux-gcc-perf

      - name: Run performance tests
        run: ctest --preset linux-gcc-perf-performance --output-on-failure